## config.yaml
# Training configuration for RAFT-SEnet model
training:
  learning_rate: 0.0001
  weight_decay: 0.0001  # 1e-4
  momentum: 0.9
  batch_size: 4
  epochs: 500
  luminosity_loss_weight: 1.0
  smoothing_loss_weight: 0.01
  optimizer: adam
  # Hardware
  gpu_device: 0
  # Training data paths (to be configured by user)
  train_data_dir: ./data/train
  val_data_dir: ./data/val

# Model configuration
model:
  # RAFT model settings
  raft:
    num_iterations: 12
    use_senet: true  # Modified RAFT with SENet attention
    # Path to pre-trained RAFT weights (to be downloaded)
    pretrained_weights: ./models/weights/raft-things.pth
  
  # Feature matching settings
  feature_matching:
    harris_k: 0.04
    harris_block_size: 2
    harris_ksize: 3
    harris_threshold: 0.01
    # BRIEF/ORB settings
    max_keypoints: 500
    scale_factor: 1.2
    # RANSAC settings
    ransac_iterations: 2000
    ransac_confidence: 0.995
    ransac_reproj_error: 5.0

# Dataset configuration
dataset:
  # Camera settings
  camera:
    resolution_width: 1920
    resolution_height: 1080
    frame_rate: 25
    camera_distance: 3.0  # meters from conveyor belt
  
  # Pixel to meter conversion (calibration)
  pixel_to_meter: 0.001  # to be calibrated per camera setup
  
  # Illumination conditions
  illumination:
    lab_low: 50      # lux
    lab_high: 1000   # lux
    mine_range: [10, 500]  # lux
  
  # Speed settings (m/s)
  belt_speeds:
    lab: [0.5, 1.0, 1.5, 2.0, 3.0, 3.5, 4.5]
    mine: [1.0, 5.0]

# Evaluation configuration
evaluation:
  metrics:
    - mae
    - rmse
    - error_percent
  # Comparison baselines
  optical_flow_baselines:
    - tv_l1
    - flownet2
    - raft
  feature_matching_baselines:
    - sift
    - fast
    - orb

# Fusion configuration
fusion:
  # Bayesian weight parameters (adjusted per field conditions)
  weight_a: 0.5  # brightness weight coefficient
  weight_b: 0.5  # contrast weight coefficient
  # Weight normalization applied automatically

# Output configuration
output:
  results_dir: ./results
  save_visualizations: true
  log_level: INFO